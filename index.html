<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tính Chi Phí Đồng Phục Doanh Nghiệp</title>
  <meta name="description" content="Công cụ tính toán chi phí đồng phục doanh nghiệp chuyên nghiệp">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#001F3F', deep: '#00152B', light: '#002B57' },
            gold: { DEFAULT: '#D4AF77', light: '#E8D5B5', dark: '#B8944D' },
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="assets/style.css">


</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER - Fixed Top Bar
       ═══════════════════════════════════════════ -->
  <header class="header-gradient fixed top-0 left-0 right-0 z-50">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-3 md:py-4">
      <div class="flex items-center justify-between gap-4">
        <!-- Logo / Brand -->
        <div class="flex items-center gap-2 min-w-0">
          <span class="icon-wrap" style="width:28px;height:28px;color:var(--gold)"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z" /><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z" /></svg></span>
          <span class="font-bold text-sm md:text-base tracking-wide text-gold-light hidden sm:inline">
            TÍNH CHI PHÍ ĐỒNG PHỤC
          </span>
        </div>

        <!-- Title -->
        <!-- <h1 class="text-base md:text-xl lg:text-2xl font-bold tracking-wide text-center flex-1 min-w-0 truncate"
            style="color: var(--white)">
          Công cụ tính toán chi phí đồng phục doanh nghiệp
        </h1> -->

        <!-- Reset Button -->
        <button id="btn-reset" class="btn-outline-gold flex items-center gap-1.5 flex-shrink-0">
          <span class="icon-wrap icon-sm"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></span>
          <span class="hidden sm:inline">Reset tất cả</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       TAB NAVIGATION
       ═══════════════════════════════════════════ -->
  <nav class="tab-nav-wrapper fixed top-[56px] md:top-[64px] left-0 right-0 z-40"
       style="background: var(--navy-deep); border-bottom: 1px solid rgba(212,175,119,0.12);">
    <div class="max-w-6xl mx-auto px-2 md:px-6">
      <div id="tab-nav" class="flex overflow-x-auto gap-0 -mb-px scrollbar-none">
        <!-- Tabs rendered by JS -->
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT AREA
       ═══════════════════════════════════════════ -->
  <main class="max-w-6xl mx-auto px-4 md:px-6 pt-32 md:pt-36">
    <div id="tab-content">
      <!-- Tab content rendered by JS -->
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       BOTTOM RESULT BAR - Fixed
       ═══════════════════════════════════════════ -->
  <footer class="result-bar fixed bottom-0 left-0 right-0 z-50">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 md:py-5">
      <div class="flex flex-col md:flex-row items-center justify-between gap-3 md:gap-6">
        <!-- Left: Total -->
        <div class="text-center md:text-left">
          <div class="text-xs uppercase tracking-widest mb-1" style="color:var(--slate)">Tổng chi phí</div>
          <div id="total-amount" class="text-2xl md:text-3xl lg:text-4xl font-extrabold" style="color:var(--gold)">
            0 ₫
          </div>
          <div id="budget-comparison" class="text-sm mt-1">
            <!-- Rendered by JS -->
          </div>
          <!-- Per-tab mini summary -->
          <div id="tab-summary" class="mt-1">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Right: Action Buttons -->
        <div class="flex items-center gap-3 flex-shrink-0">
          <button id="btn-recalc" class="btn-outline-gold flex items-center gap-1.5">
            <span class="icon-wrap icon-sm"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></span> Tính lại
          </button>
          <button id="btn-export" class="btn-gold flex items-center gap-1.5">
            <span class="icon-wrap icon-sm"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m.75 12l3 3m0 0l3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg></span> Xuất PDF
          </button>
        </div>
      </div>
    </div>
  </footer>

  <!-- Print Frame (iframe overlay, no popup) -->
  <iframe id="print-frame" title="Xem trước báo cáo" tabindex="-1"></iframe>

  <!-- Main Script -->
  <script src="assets/main.js"></script>
</body>
</html>
